packages:
  - packages/*
  - services/*
allowBuilds:
  esbuild: true
syncInjectedDepsAfterScripts:
  - build
injectWorkspacePackages: true
catalog:
  pino: ^10.3.1
  pino-pretty: ^13.1.3
  '@qnaplus/scraper': ^3.1.6
  '@qnaplus/scraper-strategies': ^3.1.6
  croner: ^10.0.1
minimumReleaseAgeExclude:
  - '@qnaplus/scraper-strategies@3.1.6'
  - '@qnaplus/scraper@3.1.6'
  - ts-curl-impersonate@2.0.0-rc.0
